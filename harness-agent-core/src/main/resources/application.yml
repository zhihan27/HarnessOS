server:
  port: 8080

spring:
  application:
    name: harness-agent-core

  # PostgreSQL 数据源配置
  datasource:
    url: jdbc:postgresql://127.0.0.1:5432/harness?currentSchema=public
    username: postgres
    password: 123456
    driver-class-name: org.postgresql.Driver
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 30000
      pool-name: HarnessAgentPool
      max-lifetime: 1800000
      connection-timeout: 30000

# MyBatis-Plus 配置
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  mapper-locations: classpath:mapper/**/*.xml

# AI 模型配置
ai:
  openai:
    api-key: ${OPENAI_API_KEY:sk-5006746ad6d445d58c9e48d21bc0be6e}
    model-name: deepseek-v4-flash
    base-url: https://api.deepseek.com

  anthropic:
    api-key: ${ANTHROPIC_API_KEY:sk-5006746ad6d445d58c9e48d21bc0be6e}
    model-name: deepseek-v4-flash
    base-url: https://api.deepseek.com/anthropic

  # 记忆管理配置
  memory:
    max-tokens: 128000
    compression-threshold: 0.80
    preserved-messages: 4

# Agent 自动启动配置
agent:
  auto-start: true        # 是否启用自动启动
  worker:
    count: 3              # Worker Agent 数量
  default:
    tenant: default-tenant
    user: default-user

# 日志配置
logging:
  level:
    com.harness.core: DEBUG
    org.springframework.jdbc.datasource: DEBUG